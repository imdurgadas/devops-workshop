services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"  # Expose frontend on port 3000 (optional)
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5001:5000"  # Expose backend on port 5000 (optional)

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"  # Expose Nginx on port 80 (main entry point)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend